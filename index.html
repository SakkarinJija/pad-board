<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pad Board PCSHS Mukdahan — Online Idea Board</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FBFBF7; --ink:#1E2B4F; --ink-soft:#66738F; --ink-faint:#99A2B8;
  --navy:#1E3D7B; --navy-dark:#152C5B; --navy-tint:#E8EEFA;
  --orange:#F58220; --orange-dark:#D96A0E; --orange-tint:#FEF0E2;
  --gold:#F5C242;
  --line:#E3E6EE; --danger:#D6455B;
  --n-yellow:#FFF3B4; --n-pink:#FFDFE9; --n-mint:#D9F4E1; --n-sky:#DCEDFF; --n-lavender:#EAE3FF; --n-orange:#FFE7CC; --n-white:#FFFFFF;
  --shadow:0 1px 2px rgba(21,44,91,.09), 0 6px 18px rgba(21,44,91,.08);
  --shadow-lift:0 4px 10px rgba(21,44,91,.11), 0 16px 34px rgba(21,44,91,.13);
  --radius:14px;
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:'Sarabun',sans-serif; color:var(--ink); font-size:15px; line-height:1.55;
  background-color:var(--paper);
  background-image:
    linear-gradient(rgba(30,61,123,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30,61,123,.06) 1px, transparent 1px);
  background-size:26px 26px;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,textarea,select{font-family:inherit; font-size:15px; color:var(--ink)}
::placeholder{color:var(--ink-faint)}

/* ---------- Header ---------- */
header{
  position:sticky; top:0; z-index:40;
  background:rgba(251,251,247,.93); backdrop-filter:blur(10px);
  border-bottom:3px solid var(--orange);
}
.head-inner{max-width:1440px; margin:0 auto; padding:14px 20px 10px; display:flex; align-items:center; gap:14px; flex-wrap:wrap}
.logo{
  font-family:'Prompt',sans-serif; font-weight:700; font-size:19px; color:#fff;
  background:var(--navy); padding:6px 14px; border-radius:12px 12px 12px 3px;
  letter-spacing:.2px; flex-shrink:0; box-shadow:var(--shadow);
  border-bottom:3px solid var(--orange);
}
.board-title-wrap{flex:1; min-width:220px}
#boardTitle{
  font-family:'Prompt',sans-serif; font-weight:600; font-size:22px; width:100%;
  border:none; background:transparent; outline:none; color:var(--navy);
  border-bottom:2px dashed transparent; padding:2px 0;
}
#boardTitle:hover,#boardTitle:focus{border-bottom-color:rgba(245,130,32,.5)}
.board-sub{font-size:12.5px; color:var(--ink-soft)}
.board-sub b{color:var(--orange-dark)}
.head-actions{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
.btn{
  display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border-radius:11px;
  font-weight:600; font-size:14px; border:1px solid var(--line); background:#fff;
  color:var(--ink); transition:.15s; white-space:nowrap;
}
.btn:hover{border-color:var(--navy); color:var(--navy)}
.btn.primary{background:var(--navy); color:#fff; border-color:var(--navy); box-shadow:var(--shadow)}
.btn.primary:hover{background:var(--navy-dark)}
.btn:active{transform:scale(.97)}
.online-chip{
  display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--ink-soft);
  background:#fff; border:1px solid var(--line); padding:7px 12px; border-radius:999px;
}
.dot{width:8px; height:8px; border-radius:50%; background:#2FBF71; animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ---------- Toolbar ---------- */
.toolbar{max-width:1440px; margin:0 auto; padding:0 20px 12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap}
.search-wrap{position:relative; flex:1; min-width:180px; max-width:340px}
.search-wrap input{
  width:100%; padding:9px 14px 9px 38px; border-radius:11px; border:1px solid var(--line);
  background:#fff; outline:none; transition:.15s;
}
.search-wrap input:focus{border-color:var(--navy); box-shadow:0 0 0 3px rgba(30,61,123,.13)}
.search-wrap svg{position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--ink-faint)}
select#sortSel{padding:9px 12px; border-radius:11px; border:1px solid var(--line); background:#fff; outline:none; font-size:14px; font-weight:600}
.layout-switch{display:flex; background:#fff; border:1px solid var(--line); border-radius:11px; overflow:hidden}
.layout-switch button{padding:8px 14px; font-size:13.5px; font-weight:700; color:var(--ink-soft); transition:.15s}
.layout-switch button.active{background:var(--navy); color:#fff}
.vote-chip{
  display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border-radius:999px;
  background:var(--orange-tint); border:1.5px solid var(--orange); color:var(--orange-dark);
  font-weight:700; font-size:13.5px;
}
.gear-wrap{position:relative}
.gear-menu{
  position:absolute; right:0; top:44px; background:#fff; border:1px solid var(--line); border-radius:12px;
  box-shadow:var(--shadow-lift); min-width:250px; overflow:hidden; z-index:50; display:none;
}
.gear-menu.open{display:block}
.gear-menu .gm-label{font-size:11.5px; font-weight:700; color:var(--ink-faint); padding:10px 14px 4px; letter-spacing:.3px}
.gear-menu button{display:block; width:100%; text-align:left; padding:9px 14px; font-size:13.5px; font-weight:500}
.gear-menu button:hover{background:var(--navy-tint)}
.gear-menu button.danger{color:var(--danger)}
.gear-menu hr{border:none; border-top:1px solid var(--line); margin:4px 0}
.stats{margin-left:auto; font-size:13px; color:var(--ink-soft)}

/* ---------- Wall layout ---------- */
.board{max-width:1440px; margin:0 auto; padding:22px 20px 90px}
.board.wall{columns:4 280px; column-gap:18px}

/* ---------- Columns layout ---------- */
.board.cols-mode{display:flex; gap:16px; align-items:flex-start; overflow-x:auto; padding-bottom:120px}
.col{
  flex:0 0 300px; background:rgba(30,61,123,.045); border:1px solid rgba(30,61,123,.12);
  border-radius:16px; padding:10px 10px 12px; min-height:140px;
}
.col.dragover{background:var(--orange-tint); border-color:var(--orange); border-style:dashed}
.col-head{display:flex; align-items:center; gap:6px; padding:4px 4px 10px}
.col-head input{
  font-family:'Prompt',sans-serif; font-weight:600; font-size:15.5px; color:var(--navy);
  border:none; background:transparent; outline:none; flex:1; min-width:0;
  border-bottom:2px dashed transparent;
}
.col-head input:hover,.col-head input:focus{border-bottom-color:rgba(245,130,32,.5)}
.col-count{font-size:12px; font-weight:700; background:var(--navy); color:#fff; border-radius:999px; padding:2px 9px}
.col-del{color:var(--ink-faint); font-size:15px; padding:3px 7px; border-radius:8px}
.col-del:hover{background:rgba(214,69,91,.12); color:var(--danger)}
.col .card{margin-bottom:14px}
.col-add-post{
  width:100%; padding:10px; border-radius:11px; border:1.5px dashed rgba(30,61,123,.3);
  color:var(--navy); font-weight:600; font-size:13.5px; transition:.15s;
}
.col-add-post:hover{background:var(--navy-tint); border-style:solid}
.col-new{
  flex:0 0 240px; padding:14px; border-radius:16px; border:2px dashed rgba(30,61,123,.25);
  color:var(--navy); font-weight:700; font-size:14px; min-height:80px; transition:.15s;
}
.col-new:hover{background:var(--navy-tint); border-color:var(--navy)}

/* ---------- Card ---------- */
.card{
  break-inside:avoid; margin:0 0 18px; border-radius:4px 4px var(--radius) var(--radius);
  padding:34px 16px 12px; position:relative; box-shadow:var(--shadow);
  transition:transform .18s ease, box-shadow .18s ease;
  border:1px solid rgba(21,44,91,.07);
}
.board.wall .card:nth-child(odd){transform:rotate(-.5deg)}
.board.wall .card:nth-child(even){transform:rotate(.45deg)}
.card:hover{transform:rotate(0) translateY(-3px); box-shadow:var(--shadow-lift); z-index:2}
.card.dragging{opacity:.45; transform:rotate(2deg) scale(.98)}
.tape{
  position:absolute; top:-9px; left:50%; transform:translateX(-50%) rotate(-2deg);
  width:86px; height:22px; background:rgba(245,130,32,.28); border-radius:3px;
  border-left:1px dashed rgba(255,255,255,.85); border-right:1px dashed rgba(255,255,255,.85);
}
.card.pinned .tape{background:rgba(30,61,123,.3)}
.pin-flag{
  position:absolute; top:8px; right:10px; font-size:11.5px; font-weight:700; color:var(--navy);
  display:none; letter-spacing:.3px;
}
.card.pinned .pin-flag{display:block}
.drag-grip{position:absolute; top:9px; left:12px; color:rgba(21,44,91,.28); font-size:13px; letter-spacing:2px; cursor:grab; user-select:none}
.card-head{display:flex; align-items:center; gap:9px; margin-bottom:8px}
.avatar{
  width:32px; height:32px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-family:'Prompt',sans-serif; font-weight:600; font-size:13px; color:#fff;
}
.card-author{font-weight:700; font-size:13.5px; line-height:1.2}
.card-time{font-size:11.5px; color:var(--ink-soft)}
.card-menu{margin-left:auto; position:relative}
.dots-btn{padding:4px 8px; border-radius:8px; color:var(--ink-soft); font-weight:700; letter-spacing:1px}
.dots-btn:hover{background:rgba(21,44,91,.08)}
.menu-pop{
  position:absolute; right:0; top:26px; background:#fff; border:1px solid var(--line); border-radius:11px;
  box-shadow:var(--shadow-lift); min-width:180px; overflow:hidden; z-index:20; display:none;
}
.menu-pop.open{display:block}
.menu-pop button{display:block; width:100%; text-align:left; padding:9px 14px; font-size:13.5px; font-weight:500}
.menu-pop button:hover{background:var(--navy-tint)}
.menu-pop button.danger{color:var(--danger)}
.menu-pop .mv-label{font-size:11px; font-weight:700; color:var(--ink-faint); padding:8px 14px 2px}
.card-title{font-family:'Prompt',sans-serif; font-weight:600; font-size:16.5px; margin-bottom:5px; line-height:1.35; overflow-wrap:anywhere; color:var(--navy-dark)}
.card-text{font-size:14.5px; white-space:pre-wrap; overflow-wrap:anywhere}
.card-img{width:100%; border-radius:10px; margin-top:10px; display:block; border:1px solid rgba(21,44,91,.09)}
.card-link{
  display:flex; align-items:center; gap:8px; margin-top:10px; padding:9px 12px; border-radius:10px;
  background:rgba(255,255,255,.65); border:1px solid rgba(21,44,91,.11); font-size:13px; color:var(--navy);
  text-decoration:none; font-weight:600; overflow-wrap:anywhere;
}
.card-link:hover{background:#fff}
.card-tags{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px}
.tag{font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:999px; background:rgba(21,44,91,.09); color:var(--ink-soft)}
.tag:hover{background:rgba(245,130,32,.2); color:var(--orange-dark); cursor:pointer}

/* vote */
.vote-row{display:flex; align-items:center; gap:6px; margin-top:12px}
.vote-btn{
  display:inline-flex; align-items:center; gap:6px; font-size:13.5px; font-weight:700;
  padding:6px 13px; border-radius:999px; background:var(--orange); color:#fff;
  box-shadow:0 2px 6px rgba(245,130,32,.35); transition:.13s;
}
.vote-btn:hover{background:var(--orange-dark); transform:scale(1.05)}
.vote-btn .vc{background:rgba(255,255,255,.25); border-radius:999px; padding:0 8px; font-size:12.5px}
.vote-btn.mine{outline:2px solid var(--navy); outline-offset:1px}
.vote-minus{
  width:26px; height:26px; border-radius:50%; background:#fff; border:1.5px solid var(--orange);
  color:var(--orange-dark); font-weight:800; font-size:15px; line-height:1; transition:.13s;
}
.vote-minus:hover{background:var(--orange-tint)}
.vote-bar{height:5px; border-radius:99px; background:rgba(21,44,91,.1); flex:1; overflow:hidden}
.vote-bar i{display:block; height:100%; background:var(--orange); border-radius:99px}

/* reactions */
.react-row{display:flex; gap:5px; margin-top:10px; padding-top:10px; border-top:1px dashed rgba(21,44,91,.17); flex-wrap:wrap; align-items:center}
.react-btn{
  display:inline-flex; align-items:center; gap:4px; font-size:13px; padding:4px 9px; border-radius:999px;
  background:rgba(255,255,255,.7); border:1px solid rgba(21,44,91,.11); transition:.13s; font-weight:600; color:var(--ink-soft);
}
.react-btn:hover{transform:scale(1.08); border-color:var(--navy)}
.react-btn.on{background:var(--navy-tint); border-color:var(--navy); color:var(--navy)}
.cmt-toggle{margin-left:auto; font-size:12.5px; color:var(--ink-soft); font-weight:600; padding:4px 8px; border-radius:8px}
.cmt-toggle:hover{background:rgba(21,44,91,.08)}
.cmt-box{margin-top:10px; display:none}
.cmt-box.open{display:block}
.cmt{display:flex; gap:8px; margin-bottom:8px; font-size:13px}
.cmt .avatar{width:24px; height:24px; font-size:10px}
.cmt-body{background:rgba(255,255,255,.78); border:1px solid rgba(21,44,91,.09); border-radius:4px 12px 12px 12px; padding:6px 10px; flex:1}
.cmt-body b{font-size:12px}
.cmt-input{display:flex; gap:6px}
.cmt-input input{flex:1; border:1px solid rgba(21,44,91,.17); border-radius:10px; padding:7px 11px; outline:none; background:rgba(255,255,255,.88); font-size:13.5px}
.cmt-input input:focus{border-color:var(--navy)}
.cmt-input button{background:var(--navy); color:#fff; border-radius:10px; padding:0 13px; font-weight:700; font-size:13px}

.empty{column-span:all; width:100%; text-align:center; padding:70px 20px; color:var(--ink-soft)}
.empty h2{font-family:'Prompt',sans-serif; font-size:22px; color:var(--navy); margin-bottom:8px}

.fab{
  position:fixed; right:26px; bottom:26px; z-index:45; width:60px; height:60px; border-radius:50%;
  background:var(--orange); color:#fff; font-size:30px; box-shadow:0 8px 24px rgba(245,130,32,.5);
  transition:.15s; display:flex; align-items:center; justify-content:center; line-height:1;
}
.fab:hover{transform:scale(1.08) rotate(90deg); background:var(--orange-dark)}

/* ---------- Modals ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(15,26,50,.5); backdrop-filter:blur(3px);
  z-index:60; display:none; align-items:center; justify-content:center; padding:18px;
}
.overlay.open{display:flex}
.modal{
  background:#fff; border-radius:18px; width:100%; max-width:520px; max-height:92vh; overflow:auto;
  box-shadow:0 24px 60px rgba(15,26,50,.4); animation:pop .18s ease;
  border-top:4px solid var(--orange);
}
@keyframes pop{from{transform:scale(.94); opacity:0} to{transform:scale(1); opacity:1}}
.modal-head{padding:18px 22px 0; display:flex; align-items:center; justify-content:space-between}
.modal-head h2{font-family:'Prompt',sans-serif; font-size:19px; font-weight:600; color:var(--navy)}
.x-btn{font-size:20px; color:var(--ink-soft); padding:4px 10px; border-radius:9px}
.x-btn:hover{background:rgba(21,44,91,.08)}
.modal-body{padding:16px 22px 22px; display:flex; flex-direction:column; gap:13px}
.field label{display:block; font-size:13px; font-weight:700; color:var(--ink-soft); margin-bottom:5px}
.field input[type=text],.field input[type=url],.field textarea,.field select{
  width:100%; border:1px solid var(--line); border-radius:11px; padding:10px 13px; outline:none; transition:.15s; background:#FCFCFA;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--navy); box-shadow:0 0 0 3px rgba(30,61,123,.13); background:#fff}
.field textarea{min-height:96px; resize:vertical}
.color-row{display:flex; gap:9px; flex-wrap:wrap}
.color-pick{width:34px; height:34px; border-radius:11px; border:2px solid rgba(21,44,91,.14); transition:.13s}
.color-pick.sel{border-color:var(--navy); transform:scale(1.12)}
.img-drop{
  border:2px dashed var(--line); border-radius:12px; padding:14px; text-align:center; font-size:13px;
  color:var(--ink-soft); cursor:pointer; transition:.15s;
}
.img-drop:hover{border-color:var(--orange); color:var(--orange-dark)}
.img-prev{max-width:100%; border-radius:10px; margin-top:8px; display:none}
.modal-foot{display:flex; gap:10px; justify-content:flex-end; padding-top:4px}
.hint{font-size:12px; color:var(--ink-faint)}

#toast{
  position:fixed; left:50%; bottom:100px; transform:translateX(-50%) translateY(20px); z-index:80;
  background:var(--navy); color:#fff; padding:10px 18px; border-radius:12px; font-size:14px; font-weight:600;
  opacity:0; pointer-events:none; transition:.25s; border-bottom:3px solid var(--orange);
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

@media (max-width:640px){
  .board.wall{columns:2 160px; padding:16px 12px 90px}
  .col{flex:0 0 260px}
  #boardTitle{font-size:18px}
  .logo{font-size:15px}
  .stats{display:none}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important; transition:none!important}
}
</style>
</head>
<body>

<header>
  <div class="head-inner">
    <div class="logo">Jija Board</div>
    <div class="board-title-wrap">
      <input id="boardTitle" value="Jija's class" maxlength="80" aria-label="Board title">
      <div class="board-sub">Share ideas anywhere, anytime · Click the title to rename</div>
    </div>
    <div class="head-actions">
      <span class="online-chip"><span class="dot"></span><span id="meName">…</span></span>
      <button class="btn" id="refreshBtn" title="Load the latest posts">⟳ Refresh</button>
      <button class="btn" id="exportBtn" title="Export as Markdown">⤓ Export</button>
      <button class="btn primary" id="newPostBtn">+ New post</button>
    </div>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="searchInput" placeholder="Search posts, people, or #tags…">
    </div>
    <div class="layout-switch" role="tablist" aria-label="Board layout">
      <button id="layoutWall" role="tab">🧱 Wall</button>
      <button id="layoutCols" role="tab">📊 Columns</button>
    </div>
    <select id="sortSel" aria-label="Sort posts">
      <option value="new">Newest first</option>
      <option value="vote">Most votes 🗳️</option>
      <option value="hot">Most reactions</option>
      <option value="cmt">Most comments</option>
      <option value="old">Oldest first</option>
    </select>
    <span class="vote-chip" title="Your remaining votes">🗳️ <span id="voteLeft">–</span> votes left</span>
    <div class="gear-wrap">
      <button class="btn" id="gearBtn" aria-label="Board settings">⚙️</button>
      <div class="gear-menu" id="gearMenu">
        <div class="gm-label">COLUMN TEMPLATES</div>
        <button data-tpl="kanban">📋 Kanban — To do / Doing / Done</button>
        <button data-tpl="affinity">🗂️ Affinity — group ideas</button>
        <button data-tpl="dt">💡 Design Thinking — 5 stages</button>
        <button data-tpl="swot">🎯 SWOT Analysis</button>
        <hr>
        <div class="gm-label">VOTING (DOT VOTING)</div>
        <button data-budget="3">Votes per person: 3</button>
        <button data-budget="5">Votes per person: 5</button>
        <button data-budget="10">Votes per person: 10</button>
        <button id="resetVotesBtn" class="danger">♻️ Reset all votes (start a new round)</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </div>
</header>

<main class="board wall" id="board" aria-live="polite"></main>

<button class="fab" id="fabBtn" aria-label="Create a new post">+</button>
<div id="toast" role="status"></div>

<!-- name modal -->
<div class="overlay" id="nameOverlay">
  <div class="modal" style="max-width:400px">
    <div class="modal-head"><h2>Welcome to Jija Board 👋</h2></div>
    <div class="modal-body">
      <div class="field">
        <label>Display name</label>
        <input type="text" id="nameInput" placeholder="e.g. Kru Cha, Aomsin, M.1/1 Group 3" maxlength="30">
        <div class="hint" style="margin-top:6px">Your name will appear on posts, comments, reactions, and votes.</div>
      </div>
      <div class="modal-foot">
        <button class="btn primary" id="nameSaveBtn" style="width:100%; justify-content:center">Get started</button>
      </div>
    </div>
  </div>
</div>

<!-- post modal -->
<div class="overlay" id="postOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="postModalTitle">New post</h2>
      <button class="x-btn" data-close="postOverlay" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Title</label>
        <input type="text" id="pTitle" placeholder="e.g. Science project idea" maxlength="120">
      </div>
      <div class="field">
        <label>Message</label>
        <textarea id="pText" placeholder="Share an idea, a resource, or start a discussion… #tags welcome"></textarea>
      </div>
      <div class="field" id="colField" style="display:none">
        <label>Column</label>
        <select id="pCol"></select>
      </div>
      <div class="field">
        <label>Image (optional)</label>
        <div class="img-drop" id="imgDrop">📷 Click to attach an image from your device, or paste an image link below</div>
        <input type="file" id="imgFile" accept="image/*" hidden>
        <img class="img-prev" id="imgPrev" alt="Image preview">
        <input type="url" id="pImgUrl" placeholder="https://… (image link)" style="margin-top:8px; width:100%; border:1px solid var(--line); border-radius:11px; padding:9px 13px; outline:none; background:#FCFCFA">
      </div>
      <div class="field">
        <label>Link / URL (optional)</label>
        <input type="url" id="pUrl" placeholder="https://…">
      </div>
      <div class="field">
        <label>Note color</label>
        <div class="color-row" id="colorRow"></div>
      </div>
      <div class="modal-foot">
        <button class="btn" data-close="postOverlay">Cancel</button>
        <button class="btn primary" id="postSaveBtn">Post to board</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ---- Google Apps Script bridge (falls back to localStorage when previewed locally) ---- */
const HAS_GAS = (typeof google !== 'undefined') && google.script && google.script.run;
function gsRun(fn, ...args){
  return new Promise((resolve, reject)=>{
    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fn](...args);
  });
}
/* ================= constants ================= */
const NOTE_COLORS = [
  {id:'yellow', hex:'#FFF3B4'}, {id:'orange', hex:'#FFE7CC'}, {id:'pink', hex:'#FFDFE9'},
  {id:'mint', hex:'#D9F4E1'}, {id:'sky', hex:'#DCEDFF'}, {id:'lavender', hex:'#EAE3FF'}, {id:'white', hex:'#FFFFFF'}
];
const REACTS = [
  {id:'love', emo:'❤️', label:'Love it'},
  {id:'like', emo:'👍', label:'Like'},
  {id:'wow',  emo:'😮', label:'Wow'},
  {id:'idea', emo:'💡', label:'Brilliant'}
];
const TEMPLATES = {
  kanban:  ['📌 To do', '🔄 In progress', '🔍 In review', '✅ Done'],
  affinity:['💭 New ideas (unsorted)', '📚 Content / academic', '🎲 Activities', '⭐ Selected top ideas'],
  dt:      ['🤝 Empathize', '🎯 Define', '💡 Ideate', '🛠️ Prototype', '🧪 Test'],
  swot:    ['💪 Strengths', '⚠️ Weaknesses', '🌱 Opportunities', '⛈️ Threats']
};
const AV_COLORS = ['#1E3D7B','#F58220','#0FA36B','#D6455B','#7A4FD1','#0E8FA3','#C13FA0','#B4560E'];
const KEY = 'padboard:v1';

let me = null, board = null, selColor = 'yellow', editingId = null, imgData = '', dirty = false, dragId = null;

const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 2300);
}
function avColor(name){
  let h = 0; for(const c of String(name)) h = (h*31 + c.charCodeAt(0)) >>> 0;
  return AV_COLORS[h % AV_COLORS.length];
}
function initials(name){
  const n = String(name||'?').trim();
  return n.slice(0, /[\u0E00-\u0E7F]/.test(n) ? 1 : 2).toUpperCase();
}
function timeAgo(ts){
  const d = Math.floor((Date.now()-ts)/1000);
  if(d < 60) return 'just now';
  if(d < 3600) return Math.floor(d/60)+' min ago';
  if(d < 86400) return Math.floor(d/3600)+' hr ago';
  if(d < 604800) return Math.floor(d/86400)+' days ago';
  return new Date(ts).toLocaleDateString('en-US', {day:'numeric', month:'short', year:'numeric'});
}
const voteTotal = p => Object.values(p.votes||{}).reduce((a,n)=>a+n,0);
const reactTotal = p => Object.values(p.reactions||{}).reduce((a,arr)=>a+arr.length,0);
function myVotesUsed(){
  return board.posts.reduce((a,p)=>a + ((p.votes||{})[me.name]||0), 0);
}

/* ================= storage ================= */
async function loadMe(){
  try{ me = JSON.parse(localStorage.getItem('padboard:me')); }catch(e){ me = null; }
}
async function saveMe(){ try{ localStorage.setItem('padboard:me', JSON.stringify(me)); }catch(e){} }

function migrate(b){
  b.title = b.title || 'Jija's class';
  b.layout = b.layout || 'wall';
  b.voteBudget = b.voteBudget || 5;
  if(!Array.isArray(b.columns) || !b.columns.length){
    b.columns = TEMPLATES.affinity.map(n=>({id:uid(), name:n}));
  }
  b.posts = (b.posts||[]).map(p=>({
    reactions:{love:[],like:[],wow:[],idea:[]}, comments:[], votes:{}, ...p,
    votes: p.votes || {}, col: p.col || b.columns[0].id
  }));
  return b;
}
function seedBoard(){
  const now = Date.now();
  return migrate({ title:'Jija's class', posts:[
    { id:uid(), author:'Pad Board', title:'Welcome to Jija's class idea board 🎉',
      text:'Hit + New post to share an idea, image, or link.\n\n🗳️ Press the orange Vote button to score the ideas you like (dot voting — everyone has a limited number of votes).\n📊 Switch to the Columns view and drag posts to group them Kanban/Affinity style.\n📌 Teachers: use the ⚙️ menu to pick a column template or start a new voting round.\n\nAdd a #tag anywhere in your message, then click a tag to filter posts.',
      img:'', url:'', color:'sky', ts:now-60000, pinned:true,
      reactions:{love:[],like:[],wow:[],idea:[]}, comments:[], votes:{} }
  ]});
}
async function loadBoard(){
  try{
    const raw = HAS_GAS ? await gsRun('getBoard') : localStorage.getItem(KEY);
    board = migrate(JSON.parse(raw));
    if(!Array.isArray(board.posts)) throw 0;
  }catch(e){
    board = seedBoard();
    await saveBoard();
  }
}
async function saveBoard(){
  try{
    const json = JSON.stringify(board);
    if(HAS_GAS) await gsRun('saveBoard', json);
    else localStorage.setItem(KEY, json);
  }catch(e){ toast('Could not save. Try again.'); }
}
async function mutate(fn){
  await loadBoard();
  fn(board);
  await saveBoard();
  render();
}

/* ================= render ================= */
function hashTags(text){
  return (String(text).match(/#[\w\u0E00-\u0E7Fa-zA-Z0-9_]+/g) || []).slice(0,6);
}
function sortPosts(list){
  const mode = $('sortSel').value;
  const arr = [...list];
  if(mode==='new') arr.sort((a,b)=>b.ts-a.ts);
  if(mode==='old') arr.sort((a,b)=>a.ts-b.ts);
  if(mode==='hot') arr.sort((a,b)=>reactTotal(b)-reactTotal(a) || b.ts-a.ts);
  if(mode==='cmt') arr.sort((a,b)=>(b.comments||[]).length-(a.comments||[]).length || b.ts-a.ts);
  if(mode==='vote') arr.sort((a,b)=>voteTotal(b)-voteTotal(a) || b.ts-a.ts);
  return arr.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0));
}
function filteredPosts(){
  const q = $('searchInput').value.trim().toLowerCase();
  return board.posts.filter(p=>{
    if(!q) return true;
    return [p.title, p.text, p.author].join(' ').toLowerCase().includes(q);
  });
}
function cardHTML(p, maxVote){
  const c = NOTE_COLORS.find(n=>n.id===p.color) || NOTE_COLORS[0];
  const tags = hashTags(p.text);
  const cmts = p.comments || [];
  const mine = p.author === me.name;
  const vTotal = voteTotal(p);
  const myV = (p.votes||{})[me.name]||0;
  const openCmt = (window._openCmts||new Set()).has(p.id);
  const cols = board.layout==='cols';
  const barW = maxVote > 0 ? Math.round(vTotal/maxVote*100) : 0;
  return `
  <article class="card ${p.pinned?'pinned':''}" style="background:${c.hex}" ${cols?`draggable="true" data-drag="${p.id}"`:''}>
    <div class="tape"></div>
    ${cols?'<div class="drag-grip" title="Drag to move between columns">⠿⠿</div>':''}
    <div class="pin-flag">📌 Pinned</div>
    <div class="card-head">
      <div class="avatar" style="background:${avColor(p.author)}">${esc(initials(p.author))}</div>
      <div>
        <div class="card-author">${esc(p.author)}</div>
        <div class="card-time">${timeAgo(p.ts)}${p.edited?' · edited':''}</div>
      </div>
      <div class="card-menu">
        <button class="dots-btn" data-menu="${p.id}" aria-label="Post menu">•••</button>
        <div class="menu-pop" id="menu-${p.id}">
          <button data-act="pin" data-id="${p.id}">${p.pinned?'Unpin':'📌 Pin to top'}</button>
          ${cols?`<div class="mv-label">MOVE TO COLUMN</div>
          ${board.columns.filter(col=>col.id!==p.col).map(col=>
            `<button data-act="move" data-id="${p.id}" data-col="${col.id}">➜ ${esc(col.name)}</button>`).join('')}`:''}
          ${mine?`<button data-act="edit" data-id="${p.id}">✏️ Edit post</button>
          <button data-act="del" data-id="${p.id}" class="danger">🗑 Delete post</button>`:''}
        </div>
      </div>
    </div>
    ${p.title?`<div class="card-title">${esc(p.title)}</div>`:''}
    ${p.text?`<div class="card-text">${esc(p.text)}</div>`:''}
    ${p.img?`<img class="card-img" src="${esc(p.img)}" alt="Post image" loading="lazy" onerror="this.remove()">`:''}
    ${p.url?`<a class="card-link" href="${esc(p.url)}" target="_blank" rel="noopener">🔗 <span>${esc(p.url.replace(/^https?:\/\//,'').slice(0,52))}</span></a>`:''}
    ${tags.length?`<div class="card-tags">${tags.map(t=>`<span class="tag" data-tag="${esc(t)}">${esc(t)}</span>`).join('')}</div>`:''}
    <div class="vote-row">
      <button class="vote-btn ${myV?'mine':''}" data-vote="${p.id}" title="Vote for this idea (you gave ${myV})">🗳️ Vote <span class="vc">${vTotal}</span></button>
      ${myV?`<button class="vote-minus" data-unvote="${p.id}" title="Remove 1 of your votes">−</button>`:''}
      <div class="vote-bar" title="Share of votes vs. the top idea"><i style="width:${barW}%"></i></div>
    </div>
    <div class="react-row">
      ${REACTS.map(r=>{
        const arr = (p.reactions&&p.reactions[r.id])||[];
        const on = arr.includes(me.name);
        return `<button class="react-btn ${on?'on':''}" data-react="${r.id}" data-id="${p.id}" title="${r.label}${arr.length?': '+arr.map(esc).join(', '):''}">${r.emo}${arr.length?` ${arr.length}`:''}</button>`;
      }).join('')}
      <button class="cmt-toggle" data-cmt="${p.id}">💬 ${cmts.length||''} ${cmts.length?'':'Comment'}</button>
    </div>
    <div class="cmt-box ${openCmt?'open':''}" data-pid="${p.id}">
      ${cmts.map(cm=>`
        <div class="cmt">
          <div class="avatar" style="background:${avColor(cm.author)}">${esc(initials(cm.author))}</div>
          <div class="cmt-body"><b>${esc(cm.author)}</b> · <span style="color:var(--ink-soft); font-size:11px">${timeAgo(cm.ts)}</span><br>${esc(cm.text)}</div>
        </div>`).join('')}
      <div class="cmt-input">
        <input placeholder="Write a comment…" data-cinput="${p.id}" maxlength="500">
        <button data-csend="${p.id}">Send</button>
      </div>
    </div>
  </article>`;
}
function render(){
  if(!board || !me) return;
  if(document.activeElement !== $('boardTitle')) $('boardTitle').value = board.title;
  window._openCmts = new Set([...document.querySelectorAll('.cmt-box.open')].map(el=>el.dataset.pid));

  $('layoutWall').classList.toggle('active', board.layout!=='cols');
  $('layoutCols').classList.toggle('active', board.layout==='cols');
  const used = myVotesUsed();
  $('voteLeft').textContent = Math.max(0, board.voteBudget - used) + '/' + board.voteBudget;

  const list = sortPosts(filteredPosts());
  const maxVote = Math.max(0, ...board.posts.map(voteTotal));
  const el = $('board');
  const q = $('searchInput').value.trim();

  if(board.layout === 'cols'){
    el.className = 'board cols-mode';
    el.innerHTML = board.columns.map(col=>{
      const posts = list.filter(p=>p.col===col.id || (!board.columns.some(c=>c.id===p.col) && col.id===board.columns[0].id));
      return `
      <section class="col" data-colzone="${col.id}">
        <div class="col-head">
          <input value="${esc(col.name)}" maxlength="60" data-colname="${col.id}" aria-label="Column name">
          <span class="col-count">${posts.length}</span>
          ${board.columns.length>1?`<button class="col-del" data-coldel="${col.id}" title="Delete column (its posts move to the first column)">✕</button>`:''}
        </div>
        ${posts.map(p=>cardHTML(p, maxVote)).join('')}
        <button class="col-add-post" data-addto="${col.id}">+ Post in this column</button>
      </section>`;
    }).join('') + `<button class="col-new" id="colNewBtn">+ Add column</button>`;
  } else {
    el.className = 'board wall';
    el.innerHTML = list.length ? list.map(p=>cardHTML(p, maxVote)).join('')
      : `<div class="empty"><h2>${q ? 'No posts match your search' : 'This board is empty'}</h2><p>${q ? 'Try a different search term' : 'Create the first post to get started'}</p></div>`;
  }

  const totalV = board.posts.reduce((a,p)=>a+voteTotal(p),0);
  const totalC = board.posts.reduce((a,p)=>a+(p.comments||[]).length,0);
  $('stats').textContent = `${board.posts.length} posts · ${totalV} votes · ${totalC} comments`;
  bindDnD();
}

/* ================= drag & drop ================= */
function bindDnD(){
  if(board.layout !== 'cols') return;
  document.querySelectorAll('[data-drag]').forEach(card=>{
    card.addEventListener('dragstart', e=>{
      dragId = card.dataset.drag; card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', ()=>{ card.classList.remove('dragging'); dragId = null;
      document.querySelectorAll('.col.dragover').forEach(c=>c.classList.remove('dragover')); });
  });
  document.querySelectorAll('[data-colzone]').forEach(zone=>{
    zone.addEventListener('dragover', e=>{ e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', ()=> zone.classList.remove('dragover'));
    zone.addEventListener('drop', async e=>{
      e.preventDefault(); zone.classList.remove('dragover');
      if(!dragId) return;
      const target = zone.dataset.colzone, id = dragId; dragId = null;
      await mutate(b=>{ const p = b.posts.find(x=>x.id===id); if(p) p.col = target; });
      toast('Post moved');
    });
  });
}

/* ================= events ================= */
document.addEventListener('click', async e=>{
  if(!e.target.closest('.gear-wrap')) $('gearMenu').classList.remove('open');
  const t = e.target.closest('[data-menu],[data-act],[data-react],[data-cmt],[data-csend],[data-tag],[data-close],[data-vote],[data-unvote],[data-addto],[data-coldel],[data-tpl],[data-budget],#colNewBtn');
  document.querySelectorAll('.menu-pop.open').forEach(m=>{ if(!e.target.closest('.card-menu')) m.classList.remove('open'); });
  if(!t) return;

  if(t.dataset.close){ closeModal(t.dataset.close); return; }

  if(t.dataset.menu){
    const m = $('menu-'+t.dataset.menu);
    const was = m.classList.contains('open');
    document.querySelectorAll('.menu-pop.open').forEach(x=>x.classList.remove('open'));
    if(!was) m.classList.add('open');
    return;
  }
  if(t.dataset.tag){ $('searchInput').value = t.dataset.tag; render(); return; }

  /* ---- voting ---- */
  if(t.dataset.vote){
    const id = t.dataset.vote;
    if(myVotesUsed() >= board.voteBudget){ toast(`You've used all ${board.voteBudget} votes — remove a vote from another idea first`); return; }
    await mutate(b=>{
      const p = b.posts.find(x=>x.id===id); if(!p) return;
      p.votes = p.votes || {};
      p.votes[me.name] = (p.votes[me.name]||0) + 1;
    });
    return;
  }
  if(t.dataset.unvote){
    const id = t.dataset.unvote;
    await mutate(b=>{
      const p = b.posts.find(x=>x.id===id); if(!p || !p.votes) return;
      const n = (p.votes[me.name]||0) - 1;
      if(n <= 0) delete p.votes[me.name]; else p.votes[me.name] = n;
    });
    return;
  }

  if(t.dataset.react){
    const {react, id} = t.dataset;
    await mutate(b=>{
      const p = b.posts.find(x=>x.id===id); if(!p) return;
      p.reactions = p.reactions || {love:[],like:[],wow:[],idea:[]};
      const arr = p.reactions[react] = p.reactions[react] || [];
      const i = arr.indexOf(me.name);
      i >= 0 ? arr.splice(i,1) : arr.push(me.name);
    });
    return;
  }
  if(t.dataset.cmt){
    const box = document.querySelector(`.cmt-box[data-pid="${t.dataset.cmt}"]`);
    box.classList.toggle('open');
    if(box.classList.contains('open')) box.querySelector('input').focus();
    return;
  }
  if(t.dataset.csend){ await sendComment(t.dataset.csend); return; }

  /* ---- columns ---- */
  if(t.id === 'colNewBtn'){
    await mutate(b=>{ b.columns.push({id:uid(), name:'New column'}); });
    toast('Column added — click its name to rename');
    return;
  }
  if(t.dataset.coldel){
    const cid = t.dataset.coldel;
    if(!confirm('Delete this column? Its posts will move to the first column.')) return;
    await mutate(b=>{
      b.columns = b.columns.filter(c=>c.id!==cid);
      const first = b.columns[0].id;
      b.posts.forEach(p=>{ if(p.col===cid) p.col = first; });
    });
    return;
  }
  if(t.dataset.addto){
    resetPostForm();
    $('pCol').value = t.dataset.addto;
    openModal('postOverlay'); $('pTitle').focus();
    return;
  }

  /* ---- settings ---- */
  if(t.dataset.tpl){
    const tpl = t.dataset.tpl;
    if(!confirm('Replace the current columns with this template? All posts will move to the first column of the template.')) return;
    await mutate(b=>{
      b.columns = TEMPLATES[tpl].map(n=>({id:uid(), name:n}));
      const first = b.columns[0].id;
      b.posts.forEach(p=>p.col = first);
      b.layout = 'cols';
    });
    $('gearMenu').classList.remove('open');
    toast('Template applied — drag posts to sort them');
    return;
  }
  if(t.dataset.budget){
    const n = parseInt(t.dataset.budget);
    await mutate(b=>{ b.voteBudget = n; });
    $('gearMenu').classList.remove('open');
    toast(`Vote budget set to ${n} votes per person`);
    return;
  }

  if(t.dataset.act){
    const id = t.dataset.id;
    if(t.dataset.act === 'pin'){
      await mutate(b=>{ const p=b.posts.find(x=>x.id===id); if(p) p.pinned = !p.pinned; });
      toast('Pin updated');
    }
    if(t.dataset.act === 'move'){
      const cid = t.dataset.col;
      await mutate(b=>{ const p=b.posts.find(x=>x.id===id); if(p) p.col = cid; });
      toast('Post moved');
    }
    if(t.dataset.act === 'del'){
      if(confirm('Delete this post permanently?')){
        await mutate(b=>{ b.posts = b.posts.filter(x=>x.id!==id); });
        toast('Post deleted');
      }
    }
    if(t.dataset.act === 'edit'){ openEdit(id); }
  }
});

$('gearBtn').addEventListener('click', ()=> $('gearMenu').classList.toggle('open'));
$('resetVotesBtn').addEventListener('click', async ()=>{
  if(!confirm('Clear all votes and start a new voting round?')) return;
  await mutate(b=>{ b.posts.forEach(p=>p.votes = {}); });
  $('gearMenu').classList.remove('open');
  toast('All votes cleared — new round is ready 🗳️');
});
$('layoutWall').addEventListener('click', async ()=>{ await mutate(b=>{ b.layout='wall'; }); });
$('layoutCols').addEventListener('click', async ()=>{ await mutate(b=>{ b.layout='cols'; }); toast('Drag posts between columns, or use the ••• menu to move'); });

document.addEventListener('keydown', async e=>{
  if(e.key === 'Enter' && e.target.dataset && e.target.dataset.cinput) await sendComment(e.target.dataset.cinput);
  if(e.key === 'Escape') closeModal('postOverlay');
});
document.addEventListener('change', async e=>{
  if(e.target.dataset && e.target.dataset.colname){
    const cid = e.target.dataset.colname, v = e.target.value.trim() || 'Column';
    await mutate(b=>{ const c = b.columns.find(x=>x.id===cid); if(c) c.name = v; });
    toast('Column renamed');
  }
});

async function sendComment(pid){
  const inp = document.querySelector(`[data-cinput="${pid}"]`);
  const text = inp.value.trim(); if(!text) return;
  inp.value = '';
  await mutate(b=>{
    const p = b.posts.find(x=>x.id===pid); if(!p) return;
    (p.comments = p.comments || []).push({author:me.name, text, ts:Date.now()});
  });
  const box = document.querySelector(`.cmt-box[data-pid="${pid}"]`);
  if(box){ box.classList.add('open'); box.querySelector('input').focus(); }
}

$('searchInput').addEventListener('input', render);
$('sortSel').addEventListener('change', render);
$('refreshBtn').addEventListener('click', async ()=>{ await loadBoard(); render(); toast('Latest posts loaded'); });
$('boardTitle').addEventListener('change', async e=>{
  const v = e.target.value.trim() || 'Jija's class';
  await mutate(b=>{ b.title = v; });
  toast('Board renamed');
});

/* ================= post modal ================= */
function buildColorRow(){
  $('colorRow').innerHTML = NOTE_COLORS.map(c=>
    `<button class="color-pick ${selColor===c.id?'sel':''}" data-color="${c.id}" style="background:${c.hex}" aria-label="Color ${c.id}"></button>`
  ).join('');
}
$('colorRow').addEventListener('click', e=>{
  const b = e.target.closest('[data-color]'); if(!b) return;
  selColor = b.dataset.color; buildColorRow();
});
function openModal(id){ $(id).classList.add('open'); dirty = true; }
function closeModal(id){ $(id).classList.remove('open'); dirty = false; }

function buildColSelect(){
  const show = board && board.layout === 'cols';
  $('colField').style.display = show ? 'block' : 'none';
  if(show) $('pCol').innerHTML = board.columns.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
}
function resetPostForm(){
  editingId = null; imgData = ''; selColor = 'yellow';
  $('pTitle').value = $('pText').value = $('pUrl').value = $('pImgUrl').value = '';
  $('imgPrev').style.display = 'none'; $('imgPrev').src = '';
  $('postModalTitle').textContent = 'New post';
  $('postSaveBtn').textContent = 'Post to board';
  buildColorRow(); buildColSelect();
}
function openEdit(id){
  const p = board.posts.find(x=>x.id===id); if(!p) return;
  resetPostForm();
  editingId = id;
  $('pTitle').value = p.title || '';
  $('pText').value = p.text || '';
  $('pUrl').value = p.url || '';
  if(board.layout==='cols') $('pCol').value = p.col;
  if(p.img && p.img.startsWith('data:')){ imgData = p.img; $('imgPrev').src = p.img; $('imgPrev').style.display='block'; }
  else $('pImgUrl').value = p.img || '';
  selColor = p.color || 'yellow'; buildColorRow();
  $('postModalTitle').textContent = 'Edit post';
  $('postSaveBtn').textContent = 'Save changes';
  openModal('postOverlay');
}
$('newPostBtn').addEventListener('click', ()=>{ resetPostForm(); openModal('postOverlay'); $('pTitle').focus(); });
$('fabBtn').addEventListener('click', ()=>{ resetPostForm(); openModal('postOverlay'); $('pTitle').focus(); });

$('imgDrop').addEventListener('click', ()=> $('imgFile').click());
$('imgFile').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev=>{
    const img = new Image();
    img.onload = ()=>{
      const cv = document.createElement('canvas');
      const scale = Math.min(1, 900/img.width);
      cv.width = Math.round(img.width*scale); cv.height = Math.round(img.height*scale);
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      const dataUrl = cv.toDataURL('image/jpeg', .72);
      if(dataUrl.length > 900000){ toast('Image is too large — try a smaller one'); return; }
      $('imgPrev').src = dataUrl; $('imgPrev').style.display = 'block'; $('pImgUrl').value = '';
      if(HAS_GAS){
        toast('Uploading image to Google Drive…');
        gsRun('saveImage', dataUrl)
          .then(u=>{ imgData = u; toast('Image uploaded ✓'); })
          .catch(()=>{ imgData = dataUrl; toast('Drive upload failed — image embedded in the post instead'); });
      } else { imgData = dataUrl; }
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(f);
});

$('postSaveBtn').addEventListener('click', async ()=>{
  const title = $('pTitle').value.trim();
  const text = $('pText').value.trim();
  const url = $('pUrl').value.trim();
  const img = imgData || $('pImgUrl').value.trim();
  const col = (board.layout==='cols' && $('pCol').value) ? $('pCol').value : (board.columns[0]||{}).id;
  if(!title && !text && !img && !url){ toast('Add a title or message first'); return; }

  if(editingId){
    await mutate(b=>{
      const p = b.posts.find(x=>x.id===editingId); if(!p) return;
      Object.assign(p, {title, text, url, img, color:selColor, col, edited:true});
    });
    toast('Changes saved');
  } else {
    await mutate(b=>{
      b.posts.push({ id:uid(), author:me.name, title, text, img, url, color:selColor, col,
        ts:Date.now(), pinned:false, reactions:{love:[],like:[],wow:[],idea:[]}, comments:[], votes:{} });
    });
    toast('Posted to the board 🎉');
  }
  closeModal('postOverlay');
  resetPostForm();
});

/* ================= export ================= */
$('exportBtn').addEventListener('click', ()=>{
  const lines = [`# ${board.title}`, '', `> Jija Board · Exported ${new Date().toLocaleString('en-US')} · ${board.posts.length} posts`, ''];
  const groups = board.layout==='cols'
    ? board.columns.map(c=>({name:c.name, posts:sortPosts(board.posts.filter(p=>p.col===c.id))}))
    : [{name:null, posts:sortPosts(board.posts)}];
  for(const g of groups){
    if(g.name) lines.push(`# 📊 ${g.name}`, '');
    for(const p of g.posts){
      const v = voteTotal(p);
      lines.push(`## ${p.title || '(untitled)'}${p.pinned?' 📌':''}${v?` — 🗳️ ${v} votes`:''}`);
      lines.push(`- **Posted by:** ${p.author} · ${new Date(p.ts).toLocaleString('en-US')}`);
      if(p.text) lines.push('', p.text);
      if(p.url) lines.push('', `🔗 ${p.url}`);
      const r = Object.entries(p.reactions||{}).map(([k,arr])=>{
        const rr = REACTS.find(x=>x.id===k); return arr.length ? `${rr.emo} ${arr.length}` : '';
      }).filter(Boolean).join('  ');
      if(r) lines.push('', `Reactions: ${r}`);
      if(v){
        const detail = Object.entries(p.votes).map(([n,c])=>`${n} (${c})`).join(', ');
        lines.push(`Voters: ${detail}`);
      }
      if((p.comments||[]).length){
        lines.push('', '**Comments:**');
        p.comments.forEach(c=>lines.push(`- ${c.author}: ${c.text}`));
      }
      lines.push('', '---', '');
    }
  }
  const blob = new Blob([lines.join('\n')], {type:'text/markdown;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (board.title||'pad-board').replace(/\s+/g,'-') + '.md';
  a.click(); URL.revokeObjectURL(a.href);
  toast('Exported as a Markdown file');
});

/* ================= boot ================= */
async function boot(){
  buildColorRow();
  await loadMe();
  if(!me || !me.name){
    openModal('nameOverlay');
    $('nameInput').focus();
  } else {
    $('meName').textContent = me.name;
    await loadBoard(); render();
  }
  setInterval(async ()=>{
    if(dirty || dragId || document.querySelector('[data-cinput]:focus')
      || document.activeElement === $('boardTitle')
      || (document.activeElement && document.activeElement.dataset && document.activeElement.dataset.colname)) return;
    await loadBoard(); render();
  }, 8000);
}
async function saveName(){
  const n = $('nameInput').value.trim();
  if(!n){ toast('Enter a name to get started'); return; }
  me = {name:n};
  await saveMe();
  $('meName').textContent = me.name;
  closeModal('nameOverlay');
  await loadBoard(); render();
  toast(`Hi ${n} 👋 Welcome to PCSHS Mukdahan`);
}
$('nameSaveBtn').addEventListener('click', saveName);
$('nameInput').addEventListener('keydown', e=>{ if(e.key==='Enter') saveName(); });

boot();
</script>
